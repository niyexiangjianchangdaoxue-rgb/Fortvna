# Fortvna CI (第 3.2 条): ruff + mypy(strict) + pytest + gitleaks
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks 需要全量历史

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Sync deps
        run: uv sync --all-packages

      - name: Ruff lint + format
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy factor_zoo cosmos minisha

      - name: Pytest
        run: uv run pytest -q

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
